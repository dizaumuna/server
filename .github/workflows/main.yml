name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Install dependencies
        run: |
          chmod +x bin/install_dependencies.sh
          ./bin/install_dependencies.sh
          
      - name: Download ROMs
        run: |
          curl -# -L -o firmwareport.zip "https://gauss-componentotacostmanual-sg.allawnofs.com/remove-3a493f9e2bd2d23ead206e225ebd375d/component-ota/25/01/14/b1af1c4ffeba481a84b04848935a58d5.zip"
          curl -# -L -o firmwarebase.zip "https://bn.d.miui.com/V14.0.3.0.SJZMIXM/miui_JOYEUSEGlobal_V14.0.3.0.SJZMIXM_df17e3fabf_12.0.zip"

      - name: Build
        run: |
          chmod +x port.sh
          ./port.sh firmwarebase.zip firmwareport.zip
