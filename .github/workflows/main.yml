name: Build ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Install dependencies
        run: |
          chmod +x bin/install_dependencies.sh
          ./bin/install_dependencies.sh
          
      - name: Download ROMs
        run: |
          curl -# -L -o op11r.zip "https://gauss-componentotamanual.allawnofs.com/remove-8444de2415cf32887e5bfb33299faf80/component-ota/25/10/06/44431fa082f0456ba78ac797c96e3a28.zip"
          curl -# -L -o joyeuse.zip "https://bn.d.miui.com/V14.0.3.0.SJZMIXM/miui_JOYEUSEGlobal_V14.0.3.0.SJZMIXM_df17e3fabf_12.0.zip"

      - name: Build ROM
        run: |
          chmod +x bin/
          chmod +x port.sh
          ./port.sh joyeuse.zip op11r.zip

      - name: Get OTA ZIP file name
        id: getfile
        run: echo "FILE=$(cat $GITHUB_WORKSPACE/output.txt)" >> $GITHUB_ENV

      - name: Upload OTA file to PixelDrain
        run: |
          curl -X POST "https://pixeldrain.com/api/file" \
          -u":$PD_API_KEY" \
          -F "file=@$FILE"
        env:
          PD_API_KEY: ${{ secrets.PD_API_KEY }}
