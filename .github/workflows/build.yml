name: Build ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Install dependencies
        run: |
          chmod +x scripts/build_dependencies.sh
          ./scripts/build_dependencies.sh

      - name: Download firmware(s)
        run: |
          chmod +x scripts/download_fw.sh
          chmod +x scripts/*
          chmod +x tools/*
          ./scripts/download_fw.sh

      - name: Extract firmware images
        run: |
          ./scripts/extract_firmware.sh

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh
